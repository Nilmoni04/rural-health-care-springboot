spring.application.name=RHCW
server.port=${SERVER_PORT:8082}
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rural_healthcare_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:your_actual_password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
gemini.api.key=${GEMINI_API_KEY}
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:8082}